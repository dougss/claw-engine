engine:
  name: "Claw Engine"
  port: 3004
  host: "0.0.0.0"
  worktrees_dir: "~/server/.worktrees"

database:
  host: "127.0.0.1"
  port: 5432
  database: "claw_engine"
  user: "claw_engine"
  password_env: "CLAW_ENGINE_DB_PASS"

redis:
  host: "127.0.0.1"
  port: 6379

sessions:
  max_parallel: 3
  max_parallel_engine: 3
  max_parallel_delegate: 1
  health_check_interval_ms: 30000
  stall_timeout_engine_ms: 60000
  stall_timeout_delegate_ms: 300000

token_budget:
  warning_threshold: 0.75
  checkpoint_threshold: 0.85
  reserve_for_summary: 10000

models:
  default: "qwen3.5-plus"
  fallback_chain:
    - { model: "qwen3.5-plus", provider: "alibaba", mode: "engine", max_retries: 2 }
    - { model: "deepseek-v3", provider: "alibaba", mode: "engine", max_retries: 1 }
    - { model: "claude-sonnet", provider: "anthropic", mode: "delegate", max_retries: 1 }

providers:
  alibaba:
    api_key_env: "DASHSCOPE_API_KEY"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    rate_limit: { max_requests_per_minute: 8 }
  anthropic:
    binary: "claude"
    flags: ["-p", "--output-format", "stream-json"]
    estimated_daily_limit: 500000
    warning_percent: 0.70
    force_qwen_percent: 0.85

router:
  complexity_signals:
    refactor: 3
    debug: 3
    investigate: 2
    architecture: 3
    cross-repo: 4
    migration: 2
    security: 2
    crud: -2
    boilerplate: -3
    test: -1
    rename: -2
    "add field": -2
    "create endpoint": -1

validation:
  max_retries: 2
  typescript:
    - { name: "typecheck", command: "npx tsc --noEmit", required: true, retryable: true }
    - { name: "lint", command: "npm run lint", required: false, retryable: true }
    - { name: "test", command: "npm test", required: true, retryable: true }
  python:
    - { name: "typecheck", command: "mypy .", required: false, retryable: true }
    - { name: "lint", command: "ruff check .", required: false, retryable: true }
    - { name: "test", command: "pytest", required: true, retryable: true }

mcp:
  inherit_from: "~/.claude/settings.json"
  servers: {}

notifications:
  telegram:
    enabled: true
    via_openclaw: true

cleanup:
  telemetry_heartbeat_retention_days: 14
  telemetry_events_retention_days: 90
  worktree_cleanup_after_pr_merge: true
  orphan_worktree_cleanup_on_startup: true

github:
  token_env: "GITHUB_TOKEN"
  default_org: "dougss"
  auto_create_pr: true
